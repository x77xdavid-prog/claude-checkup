name: check-catalog

on:
  push:
  pull_request:

jobs:
  check-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-catalog.mjs --self-test
      - run: node scripts/check-catalog.mjs
